name: Bug Report
description: Report a bug in World Monitor Fish
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - WorldMonitor (Frontend)
        - WorldMonitor (API/Edge Functions)
        - WorldMonitor (Relay)
        - MiroFish (Backend)
        - MiroFish (Frontend)
        - Integration Service
        - Docker / Infrastructure
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node.js version, Python version, etc.
    validations:
      required: false
