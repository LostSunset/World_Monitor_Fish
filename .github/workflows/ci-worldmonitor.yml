name: CI - WorldMonitor

on:
  push:
    branches: [develop, main]
    paths: ['packages/worldmonitor/**']
  pull_request:
    branches: [develop, main]
    paths: ['packages/worldmonitor/**']

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        working-directory: packages/worldmonitor
      - run: npx tsc --noEmit
        working-directory: packages/worldmonitor

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        working-directory: packages/worldmonitor
      - run: npx biome check .
        working-directory: packages/worldmonitor

  security-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        working-directory: packages/worldmonitor
      - run: npm run test:security --if-present
        working-directory: packages/worldmonitor
