name: CI - MiroFish

on:
  push:
    branches: [develop, main]
    paths: ['packages/mirofish/**']
  pull_request:
    branches: [develop, main]
    paths: ['packages/mirofish/**']

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check .
        working-directory: packages/mirofish/backend

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest
        working-directory: packages/mirofish/backend
      - run: pytest tests/ -v --tb=short
        working-directory: packages/mirofish/backend
        env:
          SECRET_KEY: test-secret-key-for-ci
          FLASK_DEBUG: 'False'

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
        working-directory: packages/mirofish/frontend
      - run: npm run lint --if-present
        working-directory: packages/mirofish/frontend
